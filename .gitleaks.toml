[extend]
useDefault = true

[[rules]]
  description = "Discord Webhook"
  regex = "https://discord\\.com/api/webhooks/\\d+/[a-zA-Z0-9_-]+"
  tags = ["discord", "webhook"]

[[rules]]
  description = "Vercel Token"
  regex = "vc_[a-zA-Z0-9]{20,}"
  tags = ["vercel", "token"]

[[rules]]
  description = "Supabase Key"
  regex = "eyJ[a-zA-Z0-9-_=]+\\.[a-zA-Z0-9-_=]+\\.[a-zA-Z0-9-_.+/=]+"
  tags = ["supabase", "jwt"]

[[rules]]
  description = "GitHub Token"
  regex = "ghp_[a-zA-Z0-9]{36,}"
  tags = ["github", "token"]

[[rules]]
  description = "Generic API Key"
  regex = "(?i)(api[_-]?key|secret|token|password).*[:=]\\s*[\"'`][a-zA-Z0-9_-]{16,}[\"'`]"
  tags = ["api_key", "secret"]
